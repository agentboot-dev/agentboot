name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run — validate without publishing'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run when a PR is actually merged (not just closed), or on manual dispatch.
    # Also skip release commits to prevent infinite loops.
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true &&
       !startsWith(github.event.pull_request.title, 'chore: release v'))

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # RELEASE_PAT allows the version bump commit to trigger CI workflows.
          # GITHUB_TOKEN commits don't trigger workflows (prevents loops).
          token: ${{ secrets.RELEASE_PAT }}

      - name: Determine release version
        id: version
        run: |
          # Get the latest git tag (sorted by semver)
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST_TAG_VERSION="${LATEST_TAG#v}"
          echo "latest_tag=${LATEST_TAG_VERSION}" >> "$GITHUB_OUTPUT"

          # Get the version from package.json
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

          if [ -z "$LATEST_TAG_VERSION" ]; then
            # No tags exist yet — use package.json version as-is
            echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            echo "No existing tags. Will release v${PKG_VERSION}"
          elif [ "$PKG_VERSION" != "$LATEST_TAG_VERSION" ]; then
            # package.json was manually bumped (major/minor) — use it as-is
            echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
            echo "bump=false" >> "$GITHUB_OUTPUT"
            echo "Manual version bump detected: ${LATEST_TAG_VERSION} → ${PKG_VERSION}"
          else
            # package.json matches latest tag — auto-bump patch
            MAJOR=$(echo "$PKG_VERSION" | cut -d. -f1)
            MINOR=$(echo "$PKG_VERSION" | cut -d. -f2)
            PATCH=$(echo "$PKG_VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "bump=true" >> "$GITHUB_OUTPUT"
            echo "Auto-bump patch: ${PKG_VERSION} → ${NEW_VERSION}"
          fi

      - name: Check tag does not already exist
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping release."
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - name: Set up Node.js
        if: env.SKIP != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: npm install

      - name: Configure git identity
        if: env.SKIP != 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and test
        if: env.SKIP != 'true'
        run: npm run validate && npm run build && npm test

      - name: Bump version in package.json (patch auto-bump only)
        if: env.SKIP != 'true' && steps.version.outputs.bump == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version

      - name: Commit version bump and tag
        if: env.SKIP != 'true' && !inputs.dry-run
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Only commit if there are changes (patch bump modifies package.json)
          if ! git diff --quiet package.json; then
            git add package.json package-lock.json
            git commit -m "chore: release v${VERSION}"
            git push origin main
          fi

          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        id: drafter
        if: env.SKIP != 'true' && !inputs.dry-run
        uses: release-drafter/release-drafter@v6
        with:
          tag: "v${{ steps.version.outputs.version }}"
          version: "${{ steps.version.outputs.version }}"
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: env.SKIP != 'true' && !inputs.dry-run
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Ensure package.json has the correct version for publishing
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi
          npm publish --provenance

      - name: Update Homebrew formula
        if: env.SKIP != 'true' && !inputs.dry-run
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TARBALL_URL="https://registry.npmjs.org/agentboot/-/agentboot-${VERSION}.tgz"

          echo "Waiting for npm to propagate..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$TARBALL_URL")
            if [ "$HTTP_CODE" = "200" ]; then break; fi
            echo "  Attempt $i: HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done

          SHA=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          if [ -z "$SHA" ] || [ "$SHA" = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
            echo "::error::Failed to fetch tarball SHA for v${VERSION}"
            exit 1
          fi
          echo "SHA256: $SHA"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/agentboot-dev/homebrew-agentboot.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i "s|url \"https://registry.npmjs.org/agentboot/-/agentboot-.*\.tgz\"|url \"${TARBALL_URL}\"|" Formula/agentboot.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/agentboot.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agentboot.rb
          git commit -m "chore: update agentboot to v${VERSION}"
          git push

      - name: Summary
        if: env.SKIP != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
            echo "Would have released **v${VERSION}**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Released v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
            echo "- [GitHub Release](${{ steps.drafter.outputs.html_url }})" >> "$GITHUB_STEP_SUMMARY"
            echo "- [npm](https://www.npmjs.com/package/agentboot/v/${VERSION})" >> "$GITHUB_STEP_SUMMARY"
            echo "- Homebrew formula updated" >> "$GITHUB_STEP_SUMMARY"
          fi
