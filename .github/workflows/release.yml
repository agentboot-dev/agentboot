name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.4.1)'
        required: true
        type: string
      dry-run:
        description: 'Dry run — validate without publishing'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Security: assign inputs to env vars to prevent script injection.
      # Never use ${{ inputs.version }} directly in run: blocks.
      VERSION: ${{ inputs.version }}
    steps:
      - name: Validate version format
        run: |
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION. Use semver (e.g. 0.4.1)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build
        run: npm run validate && npm run build

      - name: Run tests
        run: npm test

      - name: Bump version in package.json
        run: npm version "$VERSION" --no-git-tag-version

      # Branch protection requires PRs for all changes to main.
      # RELEASE_PAT is used to push the branch and create the PR so that
      # CI workflows trigger (GITHUB_TOKEN events don't trigger workflows).
      # Tags bypass the PR rule since they're not branch refs.
      - name: Version bump via PR
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          BRANCH="release/v${VERSION}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore: release v${VERSION}"

          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release v${VERSION}" \
            --body "Automated version bump. Created by release workflow."

          # Wait for the required "Validate and build" check to pass.
          # Only this check is required by the branch ruleset — others (CLA, etc.) are optional.
          echo "Waiting for 'Validate and build' check..."
          for i in $(seq 1 90); do
            RESULT=$(gh pr checks "$BRANCH" --json name,state --jq '.[] | select(.name == "Validate and build") | .state' 2>/dev/null || echo "")
            if [ "$RESULT" = "SUCCESS" ]; then
              echo "Validate and build passed. Merging..."
              break
            elif [ "$RESULT" = "FAILURE" ]; then
              echo "::error::Validate and build failed on version bump PR"
              exit 1
            fi
            echo "  Check $i/90: ${RESULT:-waiting} — 10s..."
            sleep 10
          done

          gh pr merge "$BRANCH" --merge --delete-branch

          # Reset remote back to GITHUB_TOKEN for npm OIDC
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          # Sync local to the merge commit on main
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Tag and push
        if: ${{ !inputs.dry-run }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        id: drafter
        if: ${{ !inputs.dry-run }}
        uses: release-drafter/release-drafter@v6
        with:
          tag: "v${{ inputs.version }}"
          version: "${{ inputs.version }}"
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update Homebrew formula
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          TARBALL_URL="https://registry.npmjs.org/agentboot/-/agentboot-${VERSION}.tgz"

          echo "Waiting for npm to propagate..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$TARBALL_URL")
            if [ "$HTTP_CODE" = "200" ]; then break; fi
            echo "  Attempt $i: HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done

          SHA=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          if [ -z "$SHA" ] || [ "$SHA" = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
            echo "::error::Failed to fetch tarball SHA for v${VERSION}"
            exit 1
          fi
          echo "SHA256: $SHA"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/agentboot-dev/homebrew-agentboot.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i "s|url \"https://registry.npmjs.org/agentboot/-/agentboot-.*\.tgz\"|url \"${TARBALL_URL}\"|" Formula/agentboot.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/agentboot.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agentboot.rb
          git commit -m "chore: update agentboot to v${VERSION}"
          git push

      - name: Summary
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry Run Complete" >> $GITHUB_STEP_SUMMARY
            echo "Would have released **v${VERSION}**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Released v${VERSION}" >> $GITHUB_STEP_SUMMARY
            echo "- [GitHub Release](${{ steps.drafter.outputs.html_url }})" >> $GITHUB_STEP_SUMMARY
            echo "- [npm](https://www.npmjs.com/package/agentboot/v/${VERSION})" >> $GITHUB_STEP_SUMMARY
            echo "- Homebrew formula updated" >> $GITHUB_STEP_SUMMARY
          fi
