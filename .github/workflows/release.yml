name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.4.1)'
        required: true
        type: string
      dry-run:
        description: 'Dry run — validate without publishing'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: ${{ inputs.version }}. Use semver (e.g. 0.4.1)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build
        run: npm run validate && npm run build

      - name: Run tests
        run: npm test

      - name: Bump version in package.json
        run: npm version "${{ inputs.version }}" --no-git-tag-version

      # Branch protection requires PRs for all changes to main.
      # We create a PR for the version bump, wait for CI, then merge.
      # Tags bypass the PR rule since they're not branch refs.
      - name: Version bump via PR
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="release/v${{ inputs.version }}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ inputs.version }}"
          git push origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: release v${{ inputs.version }}" \
            --body "Automated version bump. Created by release workflow."

          # Wait for required status checks to pass, then merge
          echo "Waiting for CI checks on version bump PR..."
          PR_NUMBER=$(gh pr view "$BRANCH" --json number --jq '.number')
          for i in $(seq 1 60); do
            STATUS=$(gh pr checks "$BRANCH" --json state --jq '[.[].state] | if all(. == "SUCCESS" or . == "SKIPPED") then "ready" elif any(. == "FAILURE") then "failed" else "pending" end' 2>/dev/null || echo "pending")
            if [ "$STATUS" = "ready" ]; then
              echo "Checks passed. Merging..."
              break
            elif [ "$STATUS" = "failed" ]; then
              echo "::error::CI checks failed on version bump PR"
              exit 1
            fi
            echo "  Check $i/60: $STATUS — waiting 10s..."
            sleep 10
          done

          gh pr merge "$BRANCH" --merge --delete-branch

          # Sync local to the merge commit on main
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Tag and push
        if: ${{ !inputs.dry-run }}
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        id: drafter
        if: ${{ !inputs.dry-run }}
        uses: release-drafter/release-drafter@v6
        with:
          tag: "v${{ inputs.version }}"
          version: "${{ inputs.version }}"
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        run: npm publish --provenance

      - name: Update Homebrew formula
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ inputs.version }}"
          TARBALL_URL="https://registry.npmjs.org/agentboot/-/agentboot-${VERSION}.tgz"

          echo "Waiting for npm to propagate..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$TARBALL_URL")
            if [ "$HTTP_CODE" = "200" ]; then break; fi
            echo "  Attempt $i: HTTP $HTTP_CODE — retrying in 10s..."
            sleep 10
          done

          SHA=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          if [ -z "$SHA" ] || [ "$SHA" = "e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" ]; then
            echo "::error::Failed to fetch tarball SHA for v${VERSION}"
            exit 1
          fi
          echo "SHA256: $SHA"

          gh repo clone agentboot-dev/homebrew-agentboot /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          sed -i "s|url \"https://registry.npmjs.org/agentboot/-/agentboot-.*\.tgz\"|url \"${TARBALL_URL}\"|" Formula/agentboot.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/agentboot.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agentboot.rb
          git commit -m "chore: update agentboot to v${VERSION}"
          git push

      - name: Summary
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry Run Complete" >> $GITHUB_STEP_SUMMARY
            echo "Would have released **v${{ inputs.version }}**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Released v${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
            echo "- [GitHub Release](${{ steps.drafter.outputs.html_url }})" >> $GITHUB_STEP_SUMMARY
            echo "- [npm](https://www.npmjs.com/package/agentboot/v/${{ inputs.version }})" >> $GITHUB_STEP_SUMMARY
            echo "- Homebrew formula updated" >> $GITHUB_STEP_SUMMARY
          fi
